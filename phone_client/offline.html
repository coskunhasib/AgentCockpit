<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#11131a">
  <title>AgentCockpit Remote</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(56, 163, 255, 0.18), transparent 36%),
        #0d1016;
      color: #edf1f7;
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    .card {
      width: min(420px, 100%);
      background: rgba(18, 22, 32, 0.92);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 18px 48px rgba(0,0,0,.32);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }
    p {
      margin: 0;
      line-height: 1.6;
      color: #b8c3d6;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>AgentCockpit hala yaninda</h1>
    <p>Telefon istemcisinin uygulama kabugu acik kaldı, ama masaustu koprusu su an ulasilamiyor. Baglanti geri geldiginde ayni kisayoldan devam edebilirsin.</p>
  </div>
</body>
</html>
